<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>XI SAM 2026 · Submissão v2 (editor de layout)</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;1,400;1,600&display=swap" rel="stylesheet" />
  <meta name="ext-resource-dependency" content="assets/logo-strip.jpeg" data-resource-id="logoStrip" />
  <style>
    *{ box-sizing:border-box; }
    html,body{ margin:0; padding:0; }
    body{ font-family:'IBM Plex Sans', system-ui, -apple-system, sans-serif; color:#0C1A2B; background:#F7F9FB; -webkit-font-smoothing:antialiased; }
    textarea,input,select{ outline:none; font-family:inherit; }
    textarea:focus,input:focus,select:focus{ border-color:#00ADEF !important; box-shadow:0 0 0 3px #00ADEF22; }
    #root{ min-height:100vh; }
    .girando{ animation:girar 1s linear infinite; }
    @keyframes girar{ to{ transform:rotate(360deg); } }
    @media(max-width:860px){ .col-preview{ display:none !important; } .sub-grid{ grid-template-columns:1fr !important; } }
    @media(max-width:520px){ .cs-2col{ grid-template-columns:1fr !important; } }
  </style>

  <!-- qrcode-generator (QR real nos pôsteres TV) -->
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>

  <!-- React + Babel (versões fixadas) -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>

  <template id="__bundler_thumbnail" data-bg-color="#023E88">
    <svg viewBox="0 0 1200 800" xmlns="http://www.w3.org/2000/svg">
      <rect width="1200" height="800" fill="#023E88"/>
      <rect x="430" y="230" width="340" height="300" rx="20" fill="#ffffff"/>
      <rect x="460" y="270" width="200" height="18" rx="9" fill="#023E88"/>
      <rect x="460" y="306" width="280" height="14" rx="7" fill="#cdd9e6"/>
      <rect x="460" y="430" width="280" height="60" rx="12" fill="#00ADEF"/>
      <text x="600" y="670" font-family="'IBM Plex Sans',sans-serif" font-size="44" font-weight="800" fill="#ffffff" text-anchor="middle">Submissão SAM 2026 v2</text>
      <text x="600" y="715" font-family="'IBM Plex Sans',sans-serif" font-size="22" font-weight="500" fill="#00ADEF" text-anchor="middle">com editor de layout TV</text>
    </svg>
  </template>

  <!-- Ordem obrigatória: lib → posters (usa lib) → poster-editor (usa posters) → submissao-app -->
  <script type="text/babel" src="lib.jsx"></script>
  <script type="text/babel" src="posters.jsx"></script>
  <script type="text/babel" src="poster-editor.jsx"></script>
  <script type="text/babel" src="submissao-app.jsx"></script>
</body>
</html>
